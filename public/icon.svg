<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Solo Goalie Trainer">
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Goal frame -->
  <g stroke="#B1CDE3" stroke-linecap="round">
    <!-- Net mesh -->
    <g stroke="#1e3a5f" stroke-width="4">
      <line x1="160" y1="176" x2="352" y2="176"/>
      <line x1="160" y1="224" x2="352" y2="224"/>
      <line x1="160" y1="272" x2="352" y2="272"/>
      <line x1="160" y1="320" x2="352" y2="320"/>
      <line x1="208" y1="160" x2="208" y2="336"/>
      <line x1="256" y1="160" x2="256" y2="336"/>
      <line x1="304" y1="160" x2="304" y2="336"/>
    </g>
    <!-- Posts and crossbar -->
    <g fill="none" stroke="#B1CDE3" stroke-width="18">
      <line x1="160" y1="160" x2="160" y2="336"/>
      <line x1="352" y1="160" x2="352" y2="336"/>
      <line x1="151" y1="160" x2="361" y2="160"/>
    </g>
  </g>

  <!-- Active-shot ball, top stick-side corner -->
  <circle cx="304" cy="208" r="30" fill="#facc15"/>
</svg>
